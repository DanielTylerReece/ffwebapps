// Any comment. You must start the file with a single-line comment!
//
// ffwebapps runtime configuration. Rather than patching the browser chrome at
// runtime, we enable Firefox's first-party Web Apps (Taskbar Tabs) feature and
// allow profile-level userChrome.css (used to strip the minimal-ui toolbar).

defaultPref("browser.taskbarTabs.enabled", true);
defaultPref("toolkit.legacyUserProfileCustomizations.stylesheets", true);

// Hardware-accelerated video decoding for the app's media (offloads to the GPU,
// lightens CPU during video). These are already Firefox defaults on Linux; we
// reaffirm them per app so media stays GPU-decoded even if the user disabled HW
// decoding globally. Firefox falls back to software if no working VA-API driver
// is present. Forcing HW past Firefox's GPU blocklist and the WebRTC HW-VP8 path
// are opt-in per app (--hardware-webrtc; see taskbartabs::write_profile_prefs).
defaultPref("media.hardware-video-decoding.enabled", true);
defaultPref("media.ffvpx-hw.enabled", true);

// --- ffwebapps: open out-of-scope links in the default browser ---------------
// In a Web App (taskbar-tab) window, intercept top-level navigations: anything
// whose host is not in the per-app allow-list (`ffwebapps.allowedDomains`) is
// handed to the system default browser and cancelled here. Auth/SSO domains are
// included in the allow-list so logins keep working in-app.
try {
  const _Ci = Components.interfaces;
  const _Cc = Components.classes;
  const _Cr = Components.results;

  function ffwaMatchWildcard(pattern, host) {
    pattern = pattern.trim();
    if (!pattern) return false;
    const source =
      "^" +
      pattern.replace(/[.+?^${}()|[\]\\]/g, "\\$&").replace(/\*/g, ".*") +
      "$";
    try {
      return new RegExp(source).test(host);
    } catch (e) {
      return false;
    }
  }

  function ffwaAllowed(host) {
    let list = "";
    try {
      list = Services.prefs.getStringPref("ffwebapps.allowedDomains", "");
    } catch (e) {}
    return list.split(",").some(p => ffwaMatchWildcard(p, host));
  }

  function ffwaIsTaskbarTabWindow(win) {
    try {
      return !!(
        win &&
        win.document &&
        win.document.documentElement &&
        win.document.documentElement.hasAttribute("taskbartab")
      );
    } catch (e) {
      return false;
    }
  }

  // Open a URL in the OS default browser. We invoke `xdg-open` directly rather
  // than nsIExternalProtocolService.loadURI, because for http(s) Firefox would
  // open the link in this very runtime instead of honouring the user's default
  // browser. We strip ONLY the app's unique MOZ_APP_REMOTINGNAME so the default
  // browser launches with its own identity and can't remote the link back into
  // this app. We deliberately keep the session/display vars (MOZ_ENABLE_WAYLAND,
  // etc.): stripping them put the launched browser on a different display
  // backend than the user's running browser, so it couldn't remote into the
  // existing session and opened a new window instead of a new tab.
  function ffwaExtLog(msg) {
    try {
      let dir = "/tmp";
      try {
        dir =
          _Cc["@mozilla.org/process/environment;1"]
            .getService(_Ci.nsIEnvironment)
            .get("XDG_RUNTIME_DIR") || "/tmp";
      } catch (e) {}
      const f = _Cc["@mozilla.org/file/local;1"].createInstance(_Ci.nsIFile);
      f.initWithPath(dir + "/ffwebapps-extlink.log");
      const os = _Cc[
        "@mozilla.org/network/file-output-stream;1"
      ].createInstance(_Ci.nsIFileOutputStream);
      os.init(f, 0x02 | 0x08 | 0x10, 0o644, 0); // WRONLY | CREATE | APPEND
      const line = Date.now() + " " + msg + "\n";
      os.write(line, line.length);
      os.close();
    } catch (e) {}
  }
  function ffwaOpenExternal(spec) {
    ffwaExtLog("open-external " + spec);
    try {
      const env = _Cc["@mozilla.org/file/local;1"].createInstance(_Ci.nsIFile);
      env.initWithPath("/usr/bin/env");
      if (!env.exists()) {
        env.initWithPath("/bin/env");
      }
      const proc = _Cc["@mozilla.org/process/util;1"].createInstance(
        _Ci.nsIProcess
      );
      proc.init(env);
      // Strip this app's entire Firefox context so the default browser launches
      // like a fresh desktop login (default profile, normal remoting) and opens
      // the link as a TAB in the user's running browser — not a new window. Some
      // of these are set by Firefox at runtime (invisible in /proc/environ) and
      // would otherwise pin the spawned browser to this app's profile/instance.
      const strip = [
        "MOZ_APP_REMOTINGNAME", "MOZ_LAUNCHED_CHILD", "MOZ_APP_SILENT_START",
        "MOZ_PROFILER_STARTUP", "MOZ_ASSUME_USER_NS", "MOZ_SANDBOX_USE_CHROOT",
        "XRE_PROFILE_PATH", "XRE_PROFILE_LOCAL_PATH", "XRE_BINARY_PATH",
        "XRE_START_OFFLINE", "XRE_RESTARTED_BY_PROFILE_MANAGER",
        "MOZ_CRASHREPORTER", "MOZ_CRASHREPORTER_DATA_DIRECTORY",
        "MOZ_CRASHREPORTER_EVENTS_DIRECTORY", "MOZ_CRASHREPORTER_PING_DIRECTORY",
      ];
      for (let i = 0; i <= 12; i++) {
        strip.push("MOZ_CRASHREPORTER_RESTART_ARG_" + i);
      }
      const args = [];
      for (const v of strip) {
        args.push("-u", v);
      }
      args.push("xdg-open", spec);
      const obs = {
        observe(subj, topic) {
          try {
            ffwaExtLog("xdg-open " + topic + " exit=" + subj.exitValue);
          } catch (e) {}
        },
      };
      proc.runAsync(args, args.length, obs, false);
      return true;
    } catch (e) {
      ffwaExtLog("xdg-open threw: " + e + " -> fallback loadURI");
      Components.utils.reportError(e);
      // Fall back to the external protocol service if xdg-open is unavailable.
      try {
        _Cc["@mozilla.org/uriloader/external-protocol-service;1"]
          .getService(_Ci.nsIExternalProtocolService)
          .loadURI(
            Services.io.newURI(spec),
            Services.scriptSecurityManager.getSystemPrincipal()
          );
      } catch (e2) {
        Components.utils.reportError(e2);
      }
      return false;
    }
  }

  let _ffwaLastUrl = "";
  let _ffwaLastTime = 0;
  Services.obs.addObserver(function (subject) {
    try {
      let enabled = false;
      try {
        enabled = Services.prefs.getBoolPref(
          "ffwebapps.externalLinks.enabled",
          false
        );
      } catch (e) {}
      if (!enabled) return;

      const channel = subject.QueryInterface(_Ci.nsIHttpChannel);
      if (
        !channel.loadInfo ||
        !channel.loadInfo.isTopLevelLoad ||
        !channel.isMainDocumentChannel ||
        channel.requestMethod !== "GET"
      ) {
        return;
      }

      let win = null;
      try {
        win = subject.notificationCallbacks.getInterface(_Ci.nsILoadContext)
          .topChromeWindow;
      } catch (e) {}
      // Act on any window in this app's runtime — not only the main taskbar-tab
      // window. The runtime is exclusive to this web app, so the extra windows it
      // spawns for a link (target="_blank", window.open, SSO/SafeLinks
      // interstitials) are in scope for routing too. Those open as *normal* popup
      // windows; requiring a taskbar-tab window here is exactly what let
      // out-of-scope links slip into a stray app window instead of the browser.
      if (!win) return;

      const uri = channel.URI;
      if (!uri || !uri.scheme.startsWith("http")) return;
      if (ffwaAllowed(uri.host)) return;

      // Out of scope: hand off to the OS default browser and cancel this load.
      // De-duplicate rapid repeats of the same URL — a single link click can
      // produce more than one top-level request — so we don't open extra tabs.
      const _now = Date.now();
      const _dup = uri.spec === _ffwaLastUrl && _now - _ffwaLastTime < 600;
      _ffwaLastUrl = uri.spec;
      _ffwaLastTime = _now;
      if (!_dup) ffwaOpenExternal(uri.spec);
      channel.cancel(_Cr.NS_BINDING_ABORTED);
      // If the app spawned an extra window just for this link (i.e. not the main
      // taskbar-tab window), move it off-screen at once and close it, so the user
      // is not left looking at — or watching the flash of — a blank popup.
      if (!ffwaIsTaskbarTabWindow(win)) {
        try {
          win.moveTo(-32000, -32000);
        } catch (e) {}
        try {
          win.setTimeout(function () {
            try {
              win.close();
            } catch (e) {}
          }, 0);
        } catch (e) {}
      }
    } catch (e) {
      Components.utils.reportError(e);
    }
  }, "http-on-modify-request", false);

  // PRIMARY routing (native-app style): intercept would-be new windows/tabs at
  // the source in content — window.open(), target="_blank", middle/ctrl-click —
  // and hand out-of-scope URLs straight to the default browser, so Firefox never
  // creates a window for them at all (like Electron's openExternal / deny). The
  // observers above only act as a backstop for anything this doesn't catch.
  function ffwaFrameScriptFn() {
    function mw(pattern, host) {
      pattern = (pattern || "").trim();
      if (!pattern) return false;
      if (pattern.indexOf("*") === -1) return pattern === host;
      if (pattern.charAt(0) === "*") {
        var sfx = pattern.slice(1);
        var bare = sfx.charAt(0) === "." ? sfx.slice(1) : sfx;
        return host === bare || host.slice(-sfx.length) === sfx;
      }
      return pattern === host;
    }
    function ext(url) {
      try {
        var base = content.document ? content.document.documentURIObject : null;
        var u = Services.io.newURI(url, null, base);
        if (!u.scheme || u.scheme.indexOf("http") !== 0) return false;
        var en = false,
          list = "";
        try {
          en = Services.prefs.getBoolPref("ffwebapps.externalLinks.enabled", false);
        } catch (e) {}
        if (!en) return false;
        try {
          list = Services.prefs.getStringPref("ffwebapps.allowedDomains", "");
        } catch (e) {}
        var ok = list.split(",").some(function (p) {
          return mw(p, u.host);
        });
        return !ok;
      } catch (e) {
        return false;
      }
    }
    function route(url) {
      try {
        sendAsyncMessage("ffwebapps:open-external", { url: url });
      } catch (e) {}
    }
    addEventListener(
      "click",
      function (e) {
        try {
          var n = e.target;
          while (n && n.nodeType === 1 && n.localName !== "a") n = n.parentNode;
          if (!n || n.localName !== "a" || !n.href) return;
          var nw =
            n.target === "_blank" ||
            n.target === "_new" ||
            e.button === 1 ||
            e.ctrlKey ||
            e.metaKey;
          if (!nw) return;
          if (ext(n.href)) {
            e.preventDefault();
            e.stopPropagation();
            route(n.href);
          }
        } catch (x) {}
      },
      true
    );
    try {
      var w = content.wrappedJSObject;
      var orig = w.open;
      Components.utils.exportFunction(
        function (url, target, features) {
          try {
            if (url && ext(String(url))) {
              route(String(url));
              return null;
            }
          } catch (e) {}
          return orig.call(this, url, target, features);
        },
        w,
        { defineAs: "open" }
      );
    } catch (e) {}
  }
  try {
    Services.mm.addMessageListener("ffwebapps:open-external", function (msg) {
      try {
        ffwaOpenExternal(msg.data.url);
      } catch (e) {}
    });
    Services.mm.loadFrameScript(
      "data:application/javascript;charset=utf-8," +
        encodeURIComponent("(" + ffwaFrameScriptFn.toString() + ")();"),
      true
    );
  } catch (e) {
    Components.utils.reportError(e);
  }
} catch (e) {
  Components.utils.reportError(e);
}

// --- ffwebapps: close-to-tray, run-in-background, unread count ----------------
// Closing a web app window is intercepted and turned into a "hide" request. The
// Rust tray helper minimises/hides the window via the window manager (KWin),
// which preserves the surface — unlike unmapping the window, so there is no
// resize flicker on restore. Unread count is parsed from the "(N) ..." title.
try {
  const _Ci = Components.interfaces;
  const _Cc = Components.classes;
  const _env = _Cc["@mozilla.org/process/environment;1"].getService(
    _Ci.nsIEnvironment
  );

  const _remoting = _env.exists("MOZ_APP_REMOTINGNAME")
    ? _env.get("MOZ_APP_REMOTINGNAME")
    : "";
  const _appId =
    _remoting.indexOf("ffwebapps-") === 0 ? _remoting.substring(10) : "";
  const _runtimeDir = _env.exists("XDG_RUNTIME_DIR")
    ? _env.get("XDG_RUNTIME_DIR")
    : "/tmp";

  if (_appId) {
    const _unreadPath = _runtimeDir + "/ffwebapps-" + _appId + ".unread";
    const _runningPath = _runtimeDir + "/ffwebapps-" + _appId + ".running";
    const _hidePath = _runtimeDir + "/ffwebapps-" + _appId + ".hide";

    function _ffwaWrite(path, text) {
      try {
        const f = _Cc["@mozilla.org/file/local;1"].createInstance(_Ci.nsIFile);
        f.initWithPath(path);
        const os = _Cc[
          "@mozilla.org/network/file-output-stream;1"
        ].createInstance(_Ci.nsIFileOutputStream);
        os.init(f, 0x02 | 0x08 | 0x20, 0o644, 0); // WRONLY | CREATE | TRUNCATE
        os.write(text, text.length);
        os.close();
      } catch (e) {}
    }
    function _ffwaRemove(path) {
      try {
        const f = _Cc["@mozilla.org/file/local;1"].createInstance(_Ci.nsIFile);
        f.initWithPath(path);
        if (f.exists()) f.remove(false);
      } catch (e) {}
    }
    function _ffwaWindow() {
      try {
        const e = Services.wm.getEnumerator("navigator:browser");
        while (e.hasMoreElements()) {
          const w = e.getNext();
          if (w.document?.documentElement?.hasAttribute("taskbartab")) return w;
        }
      } catch (x) {}
      return null;
    }

    // Mark running so the tray can distinguish hidden vs not-running.
    _ffwaWrite(_runningPath, String(Services.appinfo.processID));
    Services.obs.addObserver(function () {
      _ffwaRemove(_runningPath);
      _ffwaRemove(_unreadPath);
    }, "quit-application", false);

    // Close-to-tray: intercept the window close and turn it into a hide request
    // for the tray. Taskbar-tab windows take an early return in
    // warnAboutClosingWindow and never fire browser-lastwindow-close-requested,
    // so we override the actual close path: cmd_closeWindow -> tryToCloseWindow()
    // -> WindowIsClosing() -> window.close(), plus the compositor "close" event.
    function _ffwaRequestHide() {
      _ffwaWrite(_hidePath, "1");
    }
    // Is the hide request still pending? The tray deletes the sentinel once it
    // has hidden the window; if it's still here, no tray handled the close.
    function _ffwaHidePending() {
      try {
        const f = _Cc["@mozilla.org/file/local;1"].createInstance(_Ci.nsIFile);
        f.initWithPath(_hidePath);
        return f.exists();
      } catch (e) {
        return false;
      }
    }
    Services.obs.addObserver(function (win) {
      try {
        win.addEventListener(
          "load",
          function () {
            try {
              const isTab = () =>
                win.document?.documentElement?.hasAttribute("taskbartab");
              const origClose = win.close.bind(win);
              // Close-to-tray that can never trap the window: request a hide,
              // but if no tray consumes it within a grace period (e.g. the tray
              // helper isn't running), fall through to a real close so the X
              // button / "Close" always works.
              const hideOrClose = function () {
                _ffwaRequestHide();
                try {
                  win.setTimeout(function () {
                    if (_ffwaHidePending()) {
                      try {
                        const f = _Cc[
                          "@mozilla.org/file/local;1"
                        ].createInstance(_Ci.nsIFile);
                        f.initWithPath(_hidePath);
                        if (f.exists()) f.remove(false);
                      } catch (e) {}
                      origClose();
                    }
                  }, 1500);
                } catch (e) {}
              };
              win.addEventListener(
                "close",
                function (event) {
                  if (isTab()) {
                    hideOrClose();
                    if (event.preventDefault) event.preventDefault();
                  }
                },
                true
              );
              const origWIC = win.WindowIsClosing;
              win.WindowIsClosing = function (event) {
                if (isTab()) {
                  hideOrClose();
                  return false;
                }
                return origWIC ? origWIC.call(win, event) : true;
              };
              win.close = function () {
                if (isTab()) {
                  hideOrClose();
                  return;
                }
                return origClose();
              };
            } catch (e) {}
          },
          { once: true }
        );
      } catch (e) {}
    }, "domwindowopened", false);

    // Export the unread count from the "(N) ..." window title.
    let _lastUnread = -1;
    const _timer = _Cc["@mozilla.org/timer;1"].createInstance(_Ci.nsITimer);
    Services.ffwebappsTimer = _timer; // root against GC
    _timer.initWithCallback(
      {
        notify() {
          try {
            const win = _ffwaWindow();
            if (win && win.document) {
              const m = (win.document.title || "").match(/^\((\d+)\)/);
              const count = m ? parseInt(m[1], 10) : 0;
              if (count !== _lastUnread) {
                _lastUnread = count;
                _ffwaWrite(_unreadPath, String(count));
              }
            }
          } catch (e) {}
        },
      },
      1000,
      _Ci.nsITimer.TYPE_REPEATING_SLACK
    );
  }
} catch (e) {
  Components.utils.reportError(e);
}

// Import the optional user boot files (kept for compatibility/extensibility)
try { ChromeUtils.importESModule('resource://user/boot.sys.mjs'); } catch (_) {}
