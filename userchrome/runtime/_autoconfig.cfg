      onSocketAccepted(server, transport) {
        try {
          const client = {
            transport: transport,
            isTray: false,
            buf: "",
            out: transport.openOutputStream(0, 0, 0),
            ain: transport
              .openInputStream(0, 0, 0)
              .QueryInterface(_Ci.nsIAsyncInputStream),
